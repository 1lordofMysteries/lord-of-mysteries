VERBOSE: True

MODEL:
  SESSION: 'MaPU'
  INPUT: 'input'
  TARGET: 'target'

# Optimization arguments.
OPTIM:
  BATCH_SIZE: 8
  NUM_EPOCHS: 500
  LR_INITIAL: 2e-4
  LR_MIN: 1e-6
  SEED: 3407
  WANDB: False

TRAINING:
  VAL_AFTER_EVERY: 1
  RESUME: False
  WEIGHT: '/root/sqwu/UIR/weights'
  PS_W: 256
  PS_H: 256
  TRAIN_DIR: '/root/sqwu/data/EUVP/train' # path to training data
  VAL_DIR: '/root/sqwu/data/EUVP/test'     # path to validation data
  SAVE_DIR: '/root/sqwu/UIR/weights/EUVP-ours-5-1-500'          # path to save models and images
  ORI: False
  LOG_FILE: '/root/sqwu/UIR/log/train_log_euvp_ours-5-1-500.txt'

TESTING:
  INPUT: 'input'
  TARGET: 'target'
  VAL_DIR: '/root/sqwu/data/EUVP/test'     # path to testing data
  WEIGHT: '/root/sqwu/UIR/weights/EUVP-ours-5-1-500/MaPU_epoch_403.pth'
  SAVE_IMAGES: True
  RESULT_DIR: '/root/sqwu/UIR/output/EUVP-ours-5-1-500'
  LOG_FILE: '/root/sqwu/UIR/log/test-EUVP-ours-5-1-500.txt'

LOG:
  LOG_DIR: ''