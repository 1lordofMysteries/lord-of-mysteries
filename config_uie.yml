TESTING:
  INPUT: 'input'
  TARGET: 'target'
  VAL_DIR: '/root/autodl-tmp/sqwu/data/new_UIEBD/test'     # path to testing data
  WEIGHT: '/root/autodl-tmp/sqwu/UIR/weights/UIEB11-2-500/UIR_PolyKernel_epoch_173.pth'
  SAVE_IMAGES: True
  RESULT_DIR: '/root/autodl-tmp/sqwu/UIR/output/UIEB11-2-500'
  LOG_FILE: 'test-uieb11-2-500.txt'

LOG:
  LOG_DIR: ''